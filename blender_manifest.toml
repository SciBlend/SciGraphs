schema_version = "1.0.0"

id = "scigraphs"
version = "1.0.0"
name = "SciGraphs"
tagline = "Graph Visualization and Analysis within Blender"
maintainer = "José Marín <jose.marin-farina@uv.es>"
type = "add-on"
website = "https://github.com/SciBlend/SciGraphs"
platforms = [
	"windows-x64",
	"linux-x64",
	"macos-arm64",
	"macos-x64",
]
tags = [
  	"Import-Export",
    "3D View",
    "Node"
]
blender_version_min = "5.1.0"
license = [
  "SPDX:GPL-3.0-or-later"
]
copyright =[
	"2024-2025 José Marín"
]

